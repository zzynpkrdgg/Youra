<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOURA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="calendar-btn" id="open-calendar">CALENDAR</button>
    
    <div class="main-container">
        <div class="centered-text">YOURA</div>
        <div class="button-group">
            <button class="action-btn">Complete My Outfit</button>
            <button class="action-btn">Fresh Outfit</button>
        </div>
    </div>

    <!-- Calendar Modal -->
    <div id="calendar-modal" class="modal">
        <div class="modal-content fullscreen-modal">
            <div class="modal-header">
                <button id="prev-month" class="nav-btn">&lt;</button>
                <h2 id="calendar-month-title" class="modal-title">JANUARY 2026</h2>
                <button id="next-month" class="nav-btn">&gt;</button>
                <span class="close-btn" id="close-calendar">&times;</span>
            </div>
            <div id="calendar-container" class="single-month-container"></div>
            
            <!-- Day Details Pane (Hidden by default) -->
            <div id="day-details-pane" class="day-details-pane">
                <div class="day-details-header">
                    <h2 id="details-date-title" class="details-title"></h2>
                    <span id="close-details" class="close-details-btn">&times;</span>
                </div>
                <div class="day-details-content">
                    <p id="details-weather-info" class="details-weather"></p>
                    <div class="outfit-placeholder">
                        <p>No outfits added for this day yet.</p>
                        <button class="action-btn">Add Outfit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
